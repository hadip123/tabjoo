<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabJoo</title>
  <link rel="stylesheet" href="search.css">
</head>
<body>
  <div class="container">
    <div class="search-bar">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search-input" placeholder="Search tabs..." autofocus spellcheck="false">
      <span class="shortcut-hint">Ctrl+Shift+Space</span>
    </div>
    <div id="results" class="results"></div>
    <div class="footer">
      <span><kbd>^N</kbd> <kbd>^P</kbd> navigate</span>
      <span><kbd>Enter</kbd> switch</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
  </div>
  <script src="search.js"></script>
</body>
</html>
